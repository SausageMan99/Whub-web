name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-build:
    name: Build Next.js (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install web dependencies
        working-directory: apps/web
        run: npm install --ignore-scripts
      - name: Build web
        working-directory: apps/web
        run: npm run build

  verify-quality:
    name: Quality loop (worker + web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install web dependencies
        working-directory: apps/web
        run: npm install --ignore-scripts
      - name: Install worker dependencies
        working-directory: workers/cv-worker
        run: uv sync --frozen || uv sync
      - name: Run quality loop
        run: ./scripts/verify_quality_loop.sh

  verify-worker-clean:
    name: Worker reconstructible from clean checkout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install worker dependencies
        working-directory: workers/cv-worker
        run: uv sync
      - name: Import smoke
        working-directory: workers/cv-worker
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: dummy
          WORKER_DATABASE_URL: postgresql://u:***@localhost:5432/db
        run: |
          python3 -c "import src.main; print('IMPORT_OK')"
